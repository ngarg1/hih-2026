<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>The Send-Off</title>
<style>
  :root{--ink:#0E1A24;--coral:#FF6B4A;--sand:#F3ECE1;--slate:#8AA0AD;--line:rgba(243,236,225,.14);--mono:"SF Mono",ui-monospace,Menlo,monospace;--sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(120% 80% at 50% -10%,rgba(255,107,74,.18),transparent 55%),var(--ink);color:var(--sand);font-family:var(--sans);padding:24px}
  .box{width:100%;max-width:380px;text-align:center}
  .lock{font-size:2rem}
  h1{font-weight:900;letter-spacing:-.02em;font-size:1.5rem;margin:14px 0 6px}
  p{color:var(--slate);font-size:.9rem;margin:0 0 22px}
  form{display:flex;gap:10px}
  input{flex:1;font-family:var(--mono);font-size:1rem;padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--sand)}
  input:focus{outline:2px solid var(--coral);outline-offset:1px}
  button{font-family:var(--mono);font-weight:700;background:var(--coral);color:var(--ink);border:0;border-radius:10px;padding:12px 18px;cursor:pointer}
  .err{color:var(--coral);font-size:.82rem;min-height:1.2em;margin-top:14px;font-family:var(--mono)}
</style>
</head>
<body>
  <div class="box">
    <div class="lock">🔒</div>
    <h1>The Send-Off</h1>
    <p>Enter the password to see the plan.</p>
    <form id="f">
      <input id="pw" type="password" placeholder="Password" autocomplete="off" autofocus>
      <button type="submit">Unlock</button>
    </form>
    <div class="err" id="err"></div>
  </div>

async function unlock(pw){
